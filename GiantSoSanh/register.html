<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng ký | GIANT</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="responsive.css">

</head>

<body>

<div class="login-container">

    <div class="left-panel">

        <img src="images/logo.jpg" class="logo">

        <h1>WELCOME TO GIANT</h1>

        <p>

            Tạo tài khoản để quản lý đơn hàng,
            sản phẩm yêu thích và nhận nhiều ưu đãi.

        </p>

        <img src="images/vibe-1.jpg" class="bike-image">

    </div>

    <div class="right-panel">

        <div class="login-box">

            <h2>ĐĂNG KÝ</h2>

            <input
                type="text"
                id="name"
                placeholder="Họ và tên">

            <input
                type="email"
                id="email"
                placeholder="Email">

            <input
                type="password"
                id="password"
                placeholder="Mật khẩu">

            <input
                type="password"
                id="confirmPassword"
                placeholder="Nhập lại mật khẩu">

            <button onclick="register()">

                ĐĂNG KÝ

            </button>

            <p>

                Đã có tài khoản?

                <a href="login.html">

                    Đăng nhập

                </a>

            </p>

        </div>

    </div>

</div>

<script src="register.js"></script>

</body>
</html>
