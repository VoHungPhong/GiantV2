<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | GIANT</title>

    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

<div class="login-container">

    <!-- Bên trái -->
    <div class="left-panel">

        <img src="images/logo.jpg" class="logo">

        <h1>WELCOME TO GIANT</h1>

        <p>
            Đăng nhập để quản lý tài khoản,
            sản phẩm yêu thích và đơn hàng của bạn.
        </p>

        <img src="images/vibe-1.jpg" class="bike-image">

    </div>

    <!-- Bên phải -->

    <div class="right-panel">

        <div class="login-box">

            <h2>ĐĂNG NHẬP</h2>

            <input
                type="email"
                id="email"
                placeholder="Email">

            <input
                type="password"
                id="password"
                placeholder="Mật khẩu">

            <button onclick="login()">
                ĐĂNG NHẬP
            </button>

            <p>

                Chưa có tài khoản?

                <a href="register.html">

                    Đăng ký

                </a>

            </p>

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
